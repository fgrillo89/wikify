name: wikify/compact
role: compactor
version: 1
input_schema:
  page_id: str
  title: str
  entries: list
output_schema:
  page_id: str
  definition: str
  summary: str
  parameters: list
  mechanisms: list
  relationships: list
  top_evidence: list
  tokens_in: int
  tokens_out: int
sampler_hint: haiku
prompt_template: |
  You are consolidating research notes about "{title}". Multiple extractions
  from different chunks have produced overlapping material. Your job is to
  merge them into one clean, non-redundant dossier.

  Raw entries (may contain duplicates and near-duplicates):
  {entries}

  Produce ONE consolidated dossier:

  1. **definition**: The single best one-sentence definition of {title}.
     Pick the most precise and complete definition from the entries.
     If none exists, write one from the available material.

  2. **summary**: A 3-5 sentence summary synthesizing what the corpus says
     about {title} across all entries. Cover the most important findings,
     not every detail.

  3. **parameters**: Deduplicated list of quantitative values.
     Each: {{name, value, unit, conditions}}.
     Merge entries that describe the same measurement. Keep the most
     specific value (with conditions) when duplicates exist.

  4. **mechanisms**: Deduplicated list of mechanism descriptions (short
     phrases). Merge near-duplicates into one representative phrase.
     Keep at most 6.

  5. **relationships**: Deduplicated list of relationships to other concepts.
     Each: {{target, relation, evidence}}.
     Merge duplicates. Keep at most 8.

  6. **top_evidence**: The 5-8 most informative entries from the input,
     ranked by information value. Each: {{chunk_id, doc_id, quote, summary}}.
     Prefer entries from different source documents for breadth.
     Drop entries that add no new information beyond what others already cover.

  Respond as strict JSON. No commentary.
