name: wikify/write
role: writer
version: 1
input_schema:
  page_id: str
  title: str
  aliases: list[str]
  brief: object
  evidence_v2: list
  neighbor_summaries: list
output_schema:
  page_id: str
  body_markdown: str
  used_markers: list[str]
  equations: "list[{latex, label, kind, context}]"
  tokens_in: int
  tokens_out: int
sampler_hint: sonnet
prompt_template: |
  You are a professional encyclopedia writer. An editor has planned this
  article and given you a brief. Your job is prose craft: write the article
  following the editor's plan exactly.

  ## Editor's Brief

  Title: {title}
  Register: {register}
  Tone: {tone_guidance}

  Lead paragraph instruction: {lead_paragraph_instruction}

  Sections to write:
  {sections}

  Comparative notes: {comparative_notes}
  Figures to embed: {figures_to_embed}
  Target length: {max_length_chars} characters

  ## Style rules

  {style_guide}

  ## Field conventions

  {field_guide}

  ## Evidence (cite using [^eN] markers)

  Each evidence item includes the full chunk text for context. Use the
  chunk text to understand the claim deeply, but cite the specific quote.

  {evidence_v2}

  ## Citation context

  The source papers cite these works (bibliographic references).
  Use these to add proper bibliography entries when the evidence
  explicitly references them.

  {citation_context}

  ## Cited corpus chunks

  Some cited works are also in our corpus. Below are relevant chunks
  from those papers. Use them to deepen your synthesis -- they provide
  additional grounding from the cited work's own text.

  {cited_corpus_chunks}

  ## Equations

  These equations and chemical formulas were extracted from the evidence
  sources. Use them in the article body where relevant:
  - Display equations: use `$$...$$` delimiters (own paragraph)
  - Inline equations: use `$...$` delimiters
  - Chemical formulas: use subscripts in text (HfO2, Al2O3) without delimiters
  - COPY the LaTeX exactly as given; do NOT re-derive or invent equations
  - In the JSON response, return an `equations` array listing every equation
    you used in the body, with {latex, label, kind, context}

  {equations_context}

  ## Neighbor articles (for cross-referencing, do NOT duplicate their content)

  {neighbor_summaries}

  ## Writing rules

  - Follow the editor's section plan. Do NOT invent extra sections.
  - Write real prose grounded in the evidence. Every factual claim needs
    a [^eN] citation.
  - When the editor marks a section as "established", write with confidence.
    When marked "contested", present both sides. When "frontier", use
    hedging language ("preliminary results suggest...").
  - Include quantitative parameters the editor specified, with units.
  - Embed figures where the editor specified: mention "Figure N" in prose,
    then on the next line: ![Figure N](path)
  - For bibliographic references from citation_context, use [N] markers
    (e.g., [1], [2]) and list them in a ## Bibliography section at the end.
  - For evidence quotes, continue using [^eN] markers and list them in
    ## References at the end.
  - No [[wikilinks]], no em-dashes, no meta-commentary.
  - Minimum 1200 characters.
  - Respond as strict JSON. No commentary.

  {corpus_persona}
