{% extends "base.html" %}
{% block content %}
<article class="wiki-article">
  <h1>All Categories</h1>
  <ul class="category-list">
    {% for cat in categories %}
    <li>
      <a href="{{ root }}categories/{{ cat.slug }}.html">{{ cat.name }}</a>
      <span class="count-badge">({{ cat.count }})</span>
    </li>
    {% endfor %}
  </ul>
</article>
{% endblock %}
