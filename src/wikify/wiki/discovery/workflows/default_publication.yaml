# NOTE: this DAG-shaped YAML is the *execution substrate*, not the
# user-facing config. It is too low-level: it talks about node ids,
# artifact refs, and impl strings rather than conceptual wiki steps,
# models, prompts, and templates.
#
# A user-friendly recipe layer is documented in
# docs/design/workflow-config-redesign.md. Once that lands, this file
# becomes a generated artifact: a recipe under
# src/wikify/wiki/recipes/<name>.yaml will be compiled into a
# DagRunSpec by wiki/discovery/recipe_compiler.py, and the compiled
# DAG will be written to data/wiki/_meta/runs/<run_id>/ for
# debugging/observability instead of being hand-edited here.
#
# Until then, this file is kept as the smoke-test workflow for the
# DAG executor and is referenced by tests/test_wiki/test_discovery/.

workflow_id: default_publication
strategy_id: synopsis_first_publication

nodes:
  - id: profile
    impl: profile_document
    inputs:
      document: {kind: document, key: document}
    outputs:
      profile: {kind: profile, key: profile}

  - id: plan
    impl: plan_units
    inputs:
      document: {kind: document, key: document}
      profile:  {kind: profile,  key: profile}
    outputs:
      units: {kind: units, key: units}
    params:
      chunk_budget: 64

  - id: extract_text
    impl: extract_text
    inputs:
      units: {kind: units, key: units}
    outputs:
      text_notes: {kind: notes, key: text_notes}
    params:
      model: stub-fast

  - id: extract_multimodal
    impl: extract_multimodal
    inputs:
      units: {kind: units, key: units}
    outputs:
      multimodal_notes: {kind: notes, key: multimodal_notes}
    params:
      model: stub-vision

  - id: resolve
    impl: resolve_candidates
    inputs:
      text_notes:       {kind: notes, key: text_notes}
      multimodal_notes: {kind: notes, key: multimodal_notes}
    outputs:
      candidates: {kind: candidates, key: candidates}
      all_notes:  {kind: notes,      key: all_notes}

  - id: persist
    impl: persist_notes
    inputs:
      all_notes: {kind: notes, key: all_notes}
    outputs:
      coverage: {kind: coverage, key: coverage}
