{% extends "base.html" %}
{% block content %}
<article class="wiki-article graph-page">
  <h1>Topics graph</h1>
  <p>Force-directed view of the {{ navigation.groups|length }} top-level topic(s) and their pages. Drag a node to reposition; click a page node to navigate.</p>
  <div class="graph-legend">
    <span class="legend-item"><span class="legend-dot legend-group"></span>Topic</span>
    <span class="legend-item"><span class="legend-dot legend-article"></span>Article</span>
    <span class="legend-item"><span class="legend-dot legend-person"></span>Person</span>
  </div>
  <div id="topics-graph" class="topics-graph"></div>
</article>
<script src="https://cdn.jsdelivr.net/npm/d3@7.9.0/dist/d3.min.js"></script>
<script>
(function() {
  const data = {{ graph_data|tojson|safe }};
  const root = {{ root|tojson|safe }};
  const container = document.getElementById("topics-graph");
  const width = container.clientWidth || 800;
  const height = 640;
  const svg = d3.select(container).append("svg")
    .attr("viewBox", [0, 0, width, height])
    .attr("width", "100%")
    .attr("height", height);

  const g = svg.append("g");
  svg.call(d3.zoom().scaleExtent([0.3, 4]).on("zoom", e => g.attr("transform", e.transform)));

  const link = g.append("g")
    .attr("stroke", "#a2a9b1").attr("stroke-opacity", 0.6).attr("stroke-width", 1)
    .selectAll("line").data(data.links).join("line");

  const colors = { group: "#36c", article: "#0645ad", person: "#7c3aed" };
  const radii  = { group: 9,        article: 4.5,        person: 4.5 };

  const node = g.append("g").selectAll("g").data(data.nodes).join("g")
    .attr("class", d => "graph-node graph-node-" + d.type)
    .style("cursor", d => d.url ? "pointer" : "grab")
    .on("click", (e, d) => { if (d.url) window.location.href = root + d.url; })
    .call(d3.drag().on("start", dragStart).on("drag", dragged).on("end", dragEnd));

  node.append("circle")
    .attr("r", d => radii[d.type] || 4)
    .attr("fill", d => colors[d.type] || "#999")
    .attr("stroke", "#fff").attr("stroke-width", 1.2);

  node.append("text")
    .attr("dx", d => (radii[d.type] || 4) + 4).attr("dy", 4)
    .style("font", d => d.type === "group" ? "bold 12px sans-serif" : "11px sans-serif")
    .style("fill", "#202122")
    .style("pointer-events", "none")
    .text(d => d.label);

  node.append("title").text(d => d.label);

  const sim = d3.forceSimulation(data.nodes)
    .force("link", d3.forceLink(data.links).id(d => d.id).distance(d => d.target.type === "group" ? 70 : 35))
    .force("charge", d3.forceManyBody().strength(d => d.type === "group" ? -260 : -90))
    .force("center", d3.forceCenter(width/2, height/2))
    .force("x", d3.forceX(width/2).strength(0.08))
    .force("y", d3.forceY(height/2).strength(0.08))
    .force("collide", d3.forceCollide(d => (radii[d.type] || 4) + 14));

  const PAD = 16;
  sim.on("tick", () => {
    data.nodes.forEach(d => {
      d.x = Math.max(PAD, Math.min(width - PAD, d.x));
      d.y = Math.max(PAD, Math.min(height - PAD, d.y));
    });
    link.attr("x1", d => d.source.x).attr("y1", d => d.source.y)
        .attr("x2", d => d.target.x).attr("y2", d => d.target.y);
    node.attr("transform", d => `translate(${d.x},${d.y})`);
  });

  function dragStart(e, d) { if (!e.active) sim.alphaTarget(0.3).restart(); d.fx = d.x; d.fy = d.y; }
  function dragged(e, d)   { d.fx = e.x; d.fy = e.y; }
  function dragEnd(e, d)   { if (!e.active) sim.alphaTarget(0); d.fx = null; d.fy = null; }
})();
</script>
{% endblock %}
