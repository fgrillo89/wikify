<!DOCTYPE html>
<html lang="en" data-root="{{ root }}">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ title }} - {{ wiki_name }}</title>
  <link rel="stylesheet" href="{{ root }}static/wiki.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css"
        integrity="sha384-nB0miv6/jRmo5UMMR1wu3Gz6NLsoTkbqJghGIsx//Rlm+ZU03BU6SQNC66uf4l5+" crossorigin="anonymous">
</head>
<body>
  <div class="wiki-header">
    <button class="sidebar-toggle" aria-label="Toggle sidebar">&#9776;</button>
    <a href="{{ root }}index.html" class="wiki-logo">{{ wiki_name }}</a>
    <div class="wiki-search">
      <input type="text" id="search-input" placeholder="Search wiki..." autocomplete="off">
      <div id="search-results" class="search-results"></div>
    </div>
  </div>
  <div class="wiki-container">
    <nav class="wiki-sidebar" id="wiki-sidebar">
      {% include "sidebar.html" %}
    </nav>
    <main class="wiki-content">
      {% block content %}{% endblock %}
    </main>
  </div>
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"
          integrity="sha384-7zkQWkzuo3B5mTepMUcHkMB5jZaolc2xDwL6VFqjFALcbeS9Ggm/Yr2r3Dy4lfFg" crossorigin="anonymous"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/contrib/mhchem.min.js"
          crossorigin="anonymous"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/contrib/auto-render.min.js"
          integrity="sha384-43gviWU0YVjaDtb/GhzOouOXtZMP/7XUzwPTstBeZFe/+rCMvRwr4yROQP43s0Xk" crossorigin="anonymous"
          onload="renderMathInElement(document.body,{delimiters:[{left:'$$',right:'$$',display:true},{left:'$',right:'$',display:false},{left:'\\(',right:'\\)',display:false},{left:'\\[',right:'\\]',display:true}],throwOnError:false});"></script>
  <script src="{{ root }}static/search-index.js"></script>
  <script src="{{ root }}static/search.js"></script>
  <script>
    var tgl = document.querySelector('.sidebar-toggle');
    if (tgl) tgl.addEventListener('click', function() {
      document.getElementById('wiki-sidebar').classList.toggle('sidebar-open');
    });
    // Keep the topic navigation stable across page loads: each page is a full
    // reload, so without this the sidebar reverts to only the first group open.
    // Persist manual toggles, and always expand the group holding the current
    // page so a reader can browse a topic without re-opening it every click.
    (function() {
      var sidebar = document.getElementById('wiki-sidebar');
      if (!sidebar) return;
      var KEY = 'wikifyNavOpen', store = {};
      try { store = JSON.parse(sessionStorage.getItem(KEY)) || {}; } catch (e) {}
      var groups = sidebar.querySelectorAll('details[data-group]');
      groups.forEach(function(d) {
        var id = d.getAttribute('data-group');
        if (Object.prototype.hasOwnProperty.call(store, id)) d.open = store[id];
        d.addEventListener('toggle', function() {
          store[id] = d.open;
          try { sessionStorage.setItem(KEY, JSON.stringify(store)); } catch (e) {}
        });
      });
      var here = decodeURIComponent(location.pathname.split('/').pop());
      var links = sidebar.querySelectorAll('.sidebar-group-pages a');
      for (var i = 0; i < links.length; i++) {
        if (decodeURIComponent(links[i].getAttribute('href').split('/').pop()) === here) {
          links[i].classList.add('active');
          var p = links[i].closest('details');
          while (p) { p.open = true; p = p.parentElement ? p.parentElement.closest('details') : null; }
          break;
        }
      }
    })();
  </script>
</body>
</html>
