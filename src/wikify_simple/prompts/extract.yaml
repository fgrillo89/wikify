name: wikify_simple/extract
role: extractor
version: 2
input_schema:
  chunk_id: str
  chunk_text: str
  canonical_titles: list[str]
  equations: "list[{id, latex, type, label, context}]"
  figure_captions: "list[{key, kind, num, sub, caption, image_id}]"
  images_for_doc: "list[{id, label, caption, page, path, near_chunk_ids}]"
output_schema:
  chunk_id: str
  concepts: "list[{title, aliases, kind, quote, category, definition, summary, parameters, mechanisms, relationships, equations, evidence_figures, confidence, score}]"
  tokens_in: int
  tokens_out: int
sampler_hint: haiku
prompt_template: |
  You are a research analyst building a knowledge dossier from academic text.
  Read the chunk and produce a RICH extraction for each concept worth a wiki
  page. Your output feeds an editor who will use it to plan full encyclopedic
  articles, so thoroughness matters more than brevity.

  For each concept, extract:

  1. **title**: canonical concept name (2-120 chars)
  2. **aliases**: alternative names or abbreviations
  3. **kind**: "article" or "person"
  4. **category**: phenomenon | method | material | device | theory | metric | organization | other (null for person)
  5. **quote**: verbatim span from chunk_text (5-400 chars) -- evidence anchor
  6. **definition**: one-sentence definition of this concept (in your own words)
  7. **summary**: 2-3 sentences summarizing what THIS chunk says about the concept.
     What claim does the chunk make? What result does it report? What role does
     the concept play in this context?
  8. **parameters**: quantitative values mentioned in the chunk for this concept.
     Each: {name, value, unit, conditions}. Examples:
     - {name: "switching speed", value: "<100", unit: "ns", conditions: "set operation"}
     - {name: "vacancy concentration", value: "12.1", unit: "%", conditions: "HfOx layer"}
     Extract ALL numbers with units that characterize this concept.
  9. **mechanisms**: how the concept works or is applied, as described in this chunk.
     Short phrases, not full sentences. Examples:
     - "oxygen vacancy migration forms conductive filament"
     - "self-limiting surface reaction enables atomic-scale thickness control"
  10. **relationships**: connections to other concepts. Each: {target, relation, evidence}.
      Relation types: enables, part-of, used-in, contrasts-with, produces, requires,
      improves, degrades, contains, measures.
      Example: {target: "Conductive Filament", relation: "enables", evidence: "filament formation drives switching"}
  11. **equations**: mathematical equations and chemical formulas mentioned in the chunk
      for this concept. Each: {latex, label, kind, context}. Examples:
      - {latex: "v(t) = M(q) \\cdot i(t)", label: "Eq. 1", kind: "mathematical", context: "memristor constitutive relation"}
      - {latex: "HfO_2", label: "", kind: "chemical", context: "hafnium oxide switching layer"}
      - {latex: "R_{ON}/R_{OFF} > 10^6", label: "", kind: "mathematical", context: "resistance ratio requirement"}
      - {latex: "TiO_{2-x}", label: "", kind: "chemical", context: "oxygen-deficient titanium oxide"}
      Include LaTeX notation. For chemical formulas use subscripts (H_2O, HfO_2).
      For equations include the label if one is given in the text (Eq. 1, (3), etc).
  12. **evidence_figures**: figure IDs from images_for_doc if the chunk discusses them
  13. **confidence**: extracted (named in text) | inferred (implied) | ambiguous
  14. **score**: 0.0-1.0

  Equation context (from `equations`):
  - The `equations` array lists every equation whose source position falls
    INSIDE this chunk (computed at ingest time). Each entry: {id, latex, type,
    label, context}. When a concept's mechanism or parameter is grounded in
    one of these equations, COPY the latex into the concept's `equations`
    field rather than transcribing the prose. The equation context line is
    authoritative for `parameters` extraction (numbers + units + conditions).
  - Do NOT invent equations that aren't in the array.

  Figure-caption context (from `figure_captions`):
  - The `figure_captions` array lists figures the body explicitly mentions
    near this chunk. Each entry: {key, kind, num, sub, caption, image_id}.
  - Use these as the PRIMARY source for `evidence_figures`: when a concept's
    claim is supported by a captioned figure here, populate
    `evidence_figures: ["<image_id>"]` from the entry's `image_id`.
  - When `image_id` is null, the caption is body-only (no binary image to
    cite). Use the caption as additional context for the concept's
    `definition` / `summary` but do NOT add a null id to `evidence_figures`.
  - Fall back to scanning `images_for_doc` only when `figure_captions` is
    empty AND a concept clearly matches an image caption there.

  Rules:
  - If a title is in canonical_titles, reuse that exact title.
  - quote MUST be a verbatim substring of chunk_text.
  - For person entries: category is null, skip parameters/mechanisms.
  - For bibliography/reference-only chunks: return fewer concepts but still
    extract any that are substantively discussed.
  - Respond as strict JSON. No commentary outside the JSON.

  chunk_id: {chunk_id}
  canonical_titles: {canonical_titles}
  equations: {equations}
  figure_captions: {figure_captions}
  images_for_doc: {images_for_doc}

  chunk_text:
  ---
  {chunk_text}
  ---
