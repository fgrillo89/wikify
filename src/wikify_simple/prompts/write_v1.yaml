name: wikify_simple/write/v1
role: writer
version: 1
input_schema:
  page_id: str
  title: str
  aliases: list[str]
  skeleton: str
  evidence: "list[{chunk_id: str, doc_id: str, quote: str, locator: str}]"
  neighbor_titles: list[str]
output_schema:
  page_id: str
  body_markdown: str
  used_markers: list[str]
  tokens_in: int
  tokens_out: int
sampler_hint: haiku
prompt_template: |
  You are writing a wiki page for the wikify_simple knowledge pipeline.
  The full writer system message is composed by the harness from four
  layers supplied on the WriteRequest:

    1. ``corpus_persona`` -- the domain expert persona for this corpus
    2. ``style_guide``    -- the corpus-agnostic Academic Writing Style
                             Guide (sentence craft, banned words, LLM
                             tells, abstract structure, tone)
    3. ``field_guide``    -- the field-specific writing guide (e.g.
                             materials_science, biology, physics)
    4. ``artifact_template`` -- the page-type output template
                                (wiki_concept defines the six required
                                sections; wiki_person is deterministic)

  Honour all four layers. The artifact template owns the section layout
  and hard minimums. The style guide owns sentence-level craft. The
  field guide owns vocabulary and conventions. The persona owns voice
  and stance. Stay grounded in the supplied evidence list; never invent
  claims.

  VOICE AND STYLE
  - Wikipedia voice: neutral, declarative, third person.
  - Write connected prose paragraphs. One concept per sentence.
  - Short sentences. No em-dashes as parenthetical separators.
  - No meta-commentary ("this article covers...", "in summary...",
    "in this corpus we see...").
  - Do not invent claims that are not supported by at least one quote
    in the supplied evidence list. If the evidence does not say it,
    do not write it.
  - Do NOT use ``[[wikilinks]]`` anywhere in the body. A separate
    crosslink pass populates the page frontmatter and the HTML
    renderer underlines matched terms post-render. The markdown body
    itself stays clean.
  - Cite evidence using ``[^eN]`` markers where ``N`` is the 1-based
    index into the supplied evidence list. The Definition and Open
    Questions sections do not require citations; Background,
    Mechanism / Process, and Applications each require at least one
    ``[^eN]`` marker.
  - Respond as strict JSON matching the output schema. No commentary.

  FIGURE PLACEMENT
  - When ``figures`` is supplied, mention each figure you use by its
    label in the prose ("as shown in Figure 3", "see Figure 1") inside
    the Mechanism / Process or Applications section. On the line
    IMMEDIATELY after the sentence that references it, embed the
    figure as ``![Figure N](<figure.path>)`` using the ``path`` field.
    Never group figures at the top of the page. You may skip figures
    that do not fit the prose.

  REQUIRED SECTIONS (use these exact headings, in this order)

  ## Definition
  One or two sentences stating what {title} IS. No citations. No
  ``[^eN]`` markers.

  ## Background
  Historical context, prior art, and motivation. Write at least
  three sentences as connected prose paragraphs. No bullet lists in
  this section. Include at least one ``[^eN]`` marker.

  ## Mechanism / Process
  How {title} works, how it is applied, and how it manifests. Write
  at least four sentences as connected prose paragraphs. No bullet
  lists in this section. Include at least one ``[^eN]`` marker.
  Embed figures here when they illustrate the mechanism.

  ## Applications
  Concrete use cases tied to the corpus. Write at least three
  sentences. Bullet lists ARE allowed in this section when describing
  distinct use cases. Include at least one ``[^eN]`` marker.

  ## Open Questions
  What remains unresolved or unanswered. At least one sentence. No
  citations required.

  ## References
  The visible numbered citation list. One ``[^eN]: <chunk_id> (<doc_id>)
  > "<quote>"`` line per evidence entry the prose actually cited. At
  least one definition. This section must be last.

  HARD MINIMUMS (the validator will reject the response otherwise)
  - Total body length >= 1200 characters.
  - All six required headings present in this exact order.
  - No ``[[wikilinks]]`` anywhere in the body.
  - Background: >= 3 prose sentences, >= 1 ``[^eN]`` marker, no bullets.
  - Mechanism / Process: >= 4 prose sentences, >= 1 ``[^eN]`` marker,
    no bullets.
  - Applications: >= 3 sentences, >= 1 ``[^eN]`` marker.
  - Open Questions: >= 1 sentence.
  - References: >= 1 ``[^eN]:`` definition. Every ``[^eN]`` marker in
    the prose has a matching definition.

  REQUEST
  page_id: {page_id}
  title: {title}
  aliases: {aliases}
  neighbor_titles: {neighbor_titles}
  figures: {figures}

  skeleton (refine if non-empty, else draft fresh):
  ---
  {skeleton}
  ---

  evidence:
  {evidence}
