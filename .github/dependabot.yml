version: 2
updates:
  - package-ecosystem: "uv"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    # Collapse routine minor/patch bumps into two PRs (prod, dev) so they
    # do not contend on uv.lock. Major bumps stay individual for scrutiny.
    groups:
      production-deps:
        dependency-type: "production"
        update-types: ["minor", "patch"]
      development-deps:
        dependency-type: "development"
        update-types: ["minor", "patch"]
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    groups:
      github-actions:
        patterns: ["*"]
