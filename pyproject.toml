[project]
name = "scholarforge"
version = "0.1.0"
description = "Research writing assistant: ingest papers, build knowledge graphs, generate publications"
readme = "README.md"
authors = [
    { name = "Fabio Grillo", email = "fabio.grillo89@gmail.com" }
]
requires-python = ">=3.12"
dependencies = [
    # PDF / document parsing
    "pymupdf>=1.24",
    "pymupdf4llm>=0.0.10",
    "python-docx>=1.1",
    "python-pptx>=0.6.23",
    # Data layer
    "sqlmodel>=0.0.22",
    "chromadb>=0.5",
    "sentence-transformers>=3.0",
    # LLM interface
    "litellm>=1.40",
    "tiktoken>=0.7",
    "diskcache>=5.6",
    # Reference management
    "pyzotero>=1.5",
    "bibtexparser>=1.4",
    # Visualization
    "matplotlib>=3.9",
    "plotly>=5.22",
    # Templating and export
    "jinja2>=3.1",
    # CLI and config
    "typer>=0.12",
    "pydantic-settings>=2.3",
    "rich>=13.7",
    "rapidocr-onnxruntime>=1.4.4",
    "mcp[cli]>=1.26.0",
    "markdown>=3.10.2",
    "xhtml2pdf>=0.2.17",
]

[project.optional-dependencies]
gdrive = ["google-api-python-client>=2.130", "google-auth-oauthlib>=1.2"]
dev = ["pytest>=8.0", "pytest-cov>=5.0", "ruff>=0.4"]

[project.scripts]
scholarforge = "scholarforge.cli:app"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.ruff]
line-length = 100
target-version = "py312"

[tool.ruff.lint]
select = ["E", "F", "I", "N", "W"]

[tool.ruff.lint.per-file-ignores]
"scripts/*.py" = ["E501"]

[tool.pytest.ini_options]
testpaths = ["tests"]

[dependency-groups]
dev = [
    "ruff>=0.15.8",
]
